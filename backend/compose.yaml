services:
  app:
    build: .
    container_name: watchdog-sentinel
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ep-patient-haze-amytlhn2-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require
      - SPRING_DATASOURCE_USERNAME=neondb_owner
      - DB_PASSWORD=${DB_PASSWORD}
      - PORT=8080
      - LOG_LEVEL=INFO
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/monitors/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
