spring:
  application:
    name: watchdog-sentinel

  datasource:
    url: jdbc:postgresql://ep-patient-haze-amytlhn2-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require
    username: neondb_owner
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}

alert:
  webhook:
    enabled: false
    url: ""

timer:
  thread:
    pool:
      size: 10
  shutdown:
    timeout:
      seconds: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    try-it-out-enabled: true
  default-produces-media-type: application/json

logging:
  level:
    com.watchdog: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
